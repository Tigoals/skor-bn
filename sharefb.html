<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>808Pro News</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html-to-image"></script>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#22c55e;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
}

/* HEADER */
h1 {
  text-align: center;
  margin: 40px 0 10px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 1px;
}

/* UPDATE */
#updateDate {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 30px;
}

/* GRID */
.post-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 20px;
  padding: 0 20px;
}

/* CARD PRO */
.post-card {
  position: relative;
  background: rgba(255,255,255,0.03);
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all .3s ease;
  backdrop-filter: blur(10px);
}

.post-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
  opacity:0;
  transition:.4s;
}

.post-card:hover{
  transform: translateY(-6px) scale(1.02);
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.post-card:hover::after{
  opacity:1;
}

.post-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

/* TITLE */
.post-card .title {
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;

  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* BUTTON */
.buttons {
  text-align: center;
  margin: 40px 0;
}

.buttons button {
  background: linear-gradient(135deg,#111827,#1f2937);
  border: 1px solid var(--border);
  color: #fff;
  padding: 12px 22px;
  border-radius: 999px;
  cursor: pointer;
  margin: 0 6px;
  font-weight: 600;
  transition: .25s;
}

.buttons button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg,#1f2937,#374151);
}

/* ======================
   POSTER PRO
====================== */
#output {
  position: relative;
  width: 1080px;
  height: 1080px; /* ubah dari 1080px jadi 1350px */
  margin: 40px auto;
  border-radius: 6px;
  overflow: hidden;
  display: none;
  filter: brightness(1.15) contrast(1.1) saturate(1.2);
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  background: #000;
}

/* IMAGE */
#bgImage {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY CINEMATIC */
.bg-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at top, transparent 20%, rgba(0,0,0,0.8)),
    linear-gradient(to top, rgba(0,0,0,0.95), transparent 50%);
}

/* LOGO */
.custom-logo {
  position: absolute;
  top: 40px;
  left: 40px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 1px;
}

/* BADGE */
.breaking-badge {
  position: absolute;
  top: 40px;
  right: 40px;
  background: linear-gradient(135deg,#ef4444,#dc2626);
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  border-radius: 999px;
  box-shadow: 0 6px 20px rgba(255,0,0,0.5);
}

/* TITLE POSTER */
.judul-container {
  position: absolute;
  bottom: 120px;
  padding: 0 60px;
}

.judul-container span {
  font-size: 64px;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1px;

  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;

  text-shadow: 0 8px 40px rgba(0,0,0,0.9);
}

/* WATERMARK */
.watermark-domain {
  position: absolute;
  bottom: 60px;
  left: 60px;

  font-size: 14px;
  color: rgba(255,255,255,0.85);

  padding: 6px 14px;
  border-radius: 8px;

  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}
/* LOGO WRAP */
.logo-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

/* FACEBOOK ICON STYLE */
.fb-icon{
  width:38px;
  height:38px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:900;
  font-size:20px;

  color:#fff;
  background:linear-gradient(135deg,#1877f2,#0a58ca);

  box-shadow:0 4px 12px rgba(24,119,242,0.6);
}

/* TEXT BRAND */
.logo-wrap span{
  font-size:28px;
  font-weight:800;
  letter-spacing:1px;
}
</style>
</head>

<body>

<h1>808Pro News</h1>
<div id="updateDate"></div>

<div class="post-list" id="postList"></div>

<div class="buttons">
  <button id="downloadBtn">Download</button>
  <button id="copyBtn">Copy Caption</button>
  <button id="loadMoreBtn">Load More</button>
</div>

<!-- POSTER -->
<div id="output">
  <img id="bgImage"/>
  <div class="bg-overlay"></div>

 <div class="custom-logo">
  <div class="logo-wrap">
    <div class="fb-icon">f</div>
    <span>SCORE808Pro</span>
  </div>
</div>
  <div class="breaking-badge">NEWS</div>

  <div class="judul-container">
    <span id="judulPreview"></span>
  </div>

  <div class="watermark-domain">www.beritanasional.eu.org</div>
</div>

<script>

let selectedContent = '';
let allItems = [];
let itemsPerPage = 6;
let currentIndex = 0;

const el = id => document.getElementById(id);

/* =========================
   UTIL
========================= */
function stripHtmlTags(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.innerText || '';
}

/* =========================
   WAIT RENDER (ANTI BUG DOWNLOAD)
========================= */
function waitImage(img){
  return new Promise(resolve=>{
    if(img.complete) return resolve();
    img.onload = resolve;
    img.onerror = resolve;
  });
}

async function waitRenderReady(){
  const img = el('bgImage');
  await waitImage(img);
  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,300));
}

/* =========================
   LOAD RSS
========================= */
function loadXMLFeed() {
  fetch('https://www.cnnindonesia.com/olahraga/rss')
    .then(res => res.text())
    .then(data => {
      const xml = new DOMParser().parseFromString(data, 'text/xml');
      displayFeedList(xml);
    })
    .catch(()=> alert("Gagal load RSS"));
}

document.addEventListener('DOMContentLoaded', loadXMLFeed);

/* =========================
   DISPLAY LIST
========================= */
function displayFeedList(xml) {
  const items = Array.from(xml.getElementsByTagName('item'));
  allItems = items;
  currentIndex = 0;

  el('updateDate').innerHTML =
    "Update: " + new Date(xml.getElementsByTagName('lastBuildDate')[0].textContent).toLocaleString();

  el('postList').innerHTML = '';
  showNextItems();
}

/* =========================
   LOAD MORE
========================= */
function showNextItems() {
  const list = el('postList');
  const next = allItems.slice(currentIndex, currentIndex + itemsPerPage);

  next.forEach(item => {
    const title = item.getElementsByTagName('title')[0].textContent;
    const link = item.getElementsByTagName('link')[0].textContent;
    const desc = item.getElementsByTagName('description')[0].textContent;

    const match = desc.match(/<img[^>]+src=["']([^"'>]+)["']/);
    const img = match ? match[1] : '';

    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <img src="${img}">
      <div class="title">${title}</div>
    `;

    card.onclick = () => showPoster(title, img, desc, link);
    list.appendChild(card);
  });

  currentIndex += itemsPerPage;

  el('loadMoreBtn').style.display =
    currentIndex >= allItems.length ? 'none' : 'inline-block';
}

/* =========================
   SHOW POSTER (FIX CDN)
========================= */
async function showPoster(title, fallbackImg, content, link) {
  const output = el('output');
  output.style.display = 'block';

  try {
    const res = await fetch(link);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const ogImg = doc.querySelector('meta[property="og:image"]')?.content;

    const finalImg = ogImg || fallbackImg || '';

    // 🔥 CDN STABIL + SIZE FIX
    el('bgImage').src =
      'https://images.weserv.nl/?url=' + encodeURIComponent(finalImg) + '&w=1080&h=1080&fit=cover';

    el('judulPreview').textContent = title;
    selectedContent = content;

  } catch {
    alert('Gagal load gambar');
  }
}

/* =========================
   DOWNLOAD (FIX UTAMA)
========================= */
downloadBtn.onclick = async () => {

  if(!el('output').style.display) return alert("Pilih berita dulu");

  try{
    await waitRenderReady();

    const dataUrl = await htmlToImage.toPng(el('output'), {
     pixelRatio: 2,
  cacheBust: true,
  style: {
    margin: '0',
    padding: '0',
    boxSizing: 'border-box',
    filter: 'brightness(1.15) contrast(1.1) saturate(1.2)' // ← Tambahan penting
  }
    });

    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = 'news-808pro.png';
    a.click();

  }catch{
    alert("Gagal generate gambar");
  }
};

/* =========================
   COPY SEO
========================= */
copyBtn.onclick = () => {
  if (!selectedContent) return alert('Pilih berita dulu');

  const cleanText = stripHtmlTags(selectedContent).trim();
  const shortText = cleanText.substring(0, 180);
  const title = el("judulPreview").textContent;

  const caption = `🚨Score808pro News Hari Ini

🔥 ${title}

${shortText}...

👉 Baca selengkapnya sekarang juga sebelum terlewat! @score808pro

#beritaterkini #score808pro #breakingnews #viralhariini #newsupdate #indonesia #trending #olahraga`;

  navigator.clipboard.writeText(caption).then(() => {
    alert("✅ Caption SEO berhasil disalin!");
  });
};

/* =========================
   LOAD MORE BTN
========================= */
loadMoreBtn.onclick = showNextItems;

</script>

</body>
</html>
